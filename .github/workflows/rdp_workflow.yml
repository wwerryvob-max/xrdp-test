name: Debian 12 RDP (XFCE + Cloudflare + Firefox)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  debian-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Setup Cloud Backup & Start Container
        env:
          GDRIVE_CONF: ${{ secrets.GDRIVE_CONF }}
          MEGA_USER: ${{ secrets.MEGA_USER }}
          MEGA_PASS: ${{ secrets.MEGA_PASS }}
        run: |
          mkdir -p /home/runner/userdata
          
          if [ -n "$GDRIVE_CONF" ]; then
              echo "Google Drive configuration found. Installing rclone and restoring backup..."
              sudo curl -s https://rclone.org/install.sh | sudo bash
              mkdir -p ~/.config/rclone
              echo "$GDRIVE_CONF" > ~/.config/rclone/rclone.conf
              
              echo "Downloading previous session data from Google Drive..."
              rclone copy gdrive:rdp-backup /home/runner/userdata --exclude ".cache/**" || true
              echo "BACKUP_REMOTE=gdrive" >> $GITHUB_ENV
          elif [ -n "$MEGA_USER" ] && [ -n "$MEGA_PASS" ]; then
              echo "MEGA credentials found. Installing rclone and restoring backup..."
              sudo curl -s https://rclone.org/install.sh | sudo bash
              rclone config create mega mega user "$MEGA_USER" pass "$MEGA_PASS"
              
              echo "Downloading previous session data from MEGA..."
              rclone copy mega:rdp-backup /home/runner/userdata --exclude ".cache/**" || true
              echo "BACKUP_REMOTE=mega" >> $GITHUB_ENV
          else
              echo "No backup credentials found. Skipping backup restoration."
              echo "BACKUP_REMOTE=none" >> $GITHUB_ENV
          fi

          echo "Starting Debian 12 Docker container..."
          # Run container in background, expose port 3389, mount userdata to /root, and keep it running
          docker run -d --name debian-rdp -p 3389:3389 -v /home/runner/userdata:/root debian:12 tail -f /dev/null
          
          echo "Setting up Desktop and volume permissions..."
          docker exec debian-rdp bash -c "mkdir -p /root/Desktop/SavedFiles"
          docker exec debian-rdp bash -c "chown -R root:root /root"

      - name: Install XFCE Desktop, Firefox & XRDP
        run: |
          echo "Updating system and installing dependencies..."
          docker exec debian-rdp bash -c "apt update && DEBIAN_FRONTEND=noninteractive apt install -y xfce4 xfce4-goodies xrdp dbus-x11 firefox-esr sudo curl vlc xarchiver unzip zip p7zip-full ristretto xfce4-screenshooter simplescreenrecorder webp-pixbuf-loader && apt remove -y xfce4-power-manager"
          
          echo "Adding xrdp user to ssl-cert group..."
          docker exec debian-rdp bash -c "adduser xrdp ssl-cert"

      - name: Configure Root User & XRDP
        env:
          MY_SECRET_PASS: ${{ secrets.PASS }}
        run: |
          if [ -z "$MY_SECRET_PASS" ]; then
              echo "Error: Secret 'PASS' is empty. Please add it in Repository Settings."
              exit 1
          fi
          
          echo "Setting root password..."
          docker exec debian-rdp bash -c "echo \"root:$MY_SECRET_PASS\" | chpasswd"
          
          echo "Configuring XRDP to use XFCE..."
          docker exec debian-rdp bash -c "echo 'exec startxfce4' > /root/.xsession"
          docker exec debian-rdp bash -c "chmod +x /root/.xsession"
          
          echo "Starting XRDP service..."
          docker exec debian-rdp bash -c "service xrdp start"

      - name: Start Cloudflare Tunnel & Maintain Connection
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
              echo "Error: Secret 'CF_TOKEN' is missing."
              exit 1
          fi

          echo "Downloading Cloudflared for Linux on Host..."
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          echo "Installing and Starting Cloudflare Tunnel..."
          # The tunnel runs on the host and connects to localhost:3389, which Docker maps to the container
          sudo cloudflared service install $CF_TOKEN
          
          export CF_TOKEN=""
          history -c
          
          echo -e "\n=== RDP ACCESS ==="
          echo "Username: root"
          echo "Password: (Hidden - Check your Secrets)"
          echo -e "==================\n"
          
          # Timer setup: Run for exactly 345 minutes (5 hours 45 minutes)
          END_TIME=$(($(date +%s) + 20700))
          echo "Runner will stay active until $(date -d @$END_TIME)"
          
          while [ $(date +%s) -lt $END_TIME ]; do
              echo "[$(date)] Debian 12 RDP Active - Cancel workflow to terminate early"
              sleep 60
          done
          
          echo "Time limit reached (5 hours 45 mins). Proceeding to shutdown & backup..."

      - name: Final Cloud Backup
        if: always()
        env:
          BACKUP_REMOTE: ${{ env.BACKUP_REMOTE }}
        run: |
          if [ "$BACKUP_REMOTE" != "none" ] && [ -n "$BACKUP_REMOTE" ]; then
              echo "Performing final backup to $BACKUP_REMOTE..."
              sudo rclone --config /home/runner/.config/rclone/rclone.conf sync /home/runner/userdata "$BACKUP_REMOTE:rdp-backup" --exclude ".cache/**" || true
              echo "Final backup complete."
          else
              echo "No backup remote configured. Skipping final backup."
          fi

      - name: ðŸ”„ Auto-Restart Server
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering next workflow run..."
          gh workflow run rdp_workflow.yml --repo ${{ github.repository }} --ref ${{ github.ref_name }}
